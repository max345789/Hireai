services:
  # ── Backend ──────────────────────────────────────────────────
  - type: web
    name: dab-ai-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_URL
        value: https://dabcloud.in
      - key: FRONTEND_URL
        value: https://dabcloud.in
      - key: CORS_ORIGINS
        value: https://dabcloud.in
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 3001
      - key: JWT_ACCESS_TTL
        value: 7d
      - key: LOG_LEVEL
        value: info
      - key: SANITIZE_WEBHOOK_PAYLOADS
        value: "true"
      - key: WEBHOOK_PAYLOAD_MAX_CHARS
        value: "12000"
      - key: REQUEST_BODY_LIMIT
        value: 1mb
      - key: WEBHOOK_RATE_WINDOW_MS
        value: "900000"
      - key: WEBHOOK_RATE_MAX
        value: "300"
      - key: WIDGET_RATE_WINDOW_MS
        value: "60000"
      - key: WIDGET_RATE_MAX
        value: "80"
      - key: AUTH_RATE_WINDOW_MS
        value: "900000"
      - key: AUTH_RATE_MAX
        value: "40"
      # ── Secrets: set these manually in Render dashboard ──────
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: TWILIO_SMS_NUMBER
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

  # ── Frontend ─────────────────────────────────────────────────
  - type: web
    name: dab-ai-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://dabcloud.in
      - key: VITE_WS_URL
        value: https://dabcloud.in
